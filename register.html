<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register | ENJOY CREATOR ACADEMY</title>

<link rel="stylesheet" href="style.css">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">

</head>

<body>

<section class="register-page">

<div class="container">

<div class="register-card">

<h1>🎓 REGISTER FOR FREE LIVE CLASS</h1>

<p>
Fill in your details below to reserve your FREE seat.
</p>

<form onsubmit="submitRegistration(event)">

<div class="input-box">

<label>Full Name</label>

<input type="text" id="name" placeholder="Enter Your Name" required>

</div>

<div class="input-box">

<label>Phone Number</label>

<input type="tel" id="phone" placeholder="Enter Phone Number" required>

</div>

<div class="input-box">

<label>Email Address</label>

<input type="email" id="email" placeholder="Enter Email" required>

</div>

<div class="input-box">

<label>Your Location</label>

<input type="text" id="location" placeholder="City / District" required>

</div>

<div class="input-box">

<label>Select Gender</label>

<select id="gender" required>

<option value="">Choose Gender</option>

<option>Male</option>

<option>Female</option>

<option>Other</option>

</select>

</div>

<div class="input-box">

<label>Current Job</label>

<input type="text" id="job" placeholder="Student / Employee / Business etc." required>

</div>

<button type="submit" class="btn-primary">

REGISTER NOW - FREE

</button>

</form>

</div>

</div>

</section>

<script src="script.js"></script>

</body>

</html>
